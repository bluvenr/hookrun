# Example: Auto-deploy on GitHub push to main branch
name: "github-auto-deploy"

# Authentication (optional, AND relationship if multiple set)
auth:
  token:
    source: "header"             # "header" or "query"
    key: "X-Webhook-Token"
    value: "your-secret-token"   # or use secret references: "${env:WEBHOOK_TOKEN}" / "${file:/run/secrets/token}"
  # HMAC signature verification (GitHub, GitLab, etc.)
  # hmac:
  #   header: "X-Hub-Signature-256"   # signature header name
  #   secret: "your-webhook-secret"   # HMAC secret key (from GitHub webhook settings)
  #   algorithm: "sha256"              # "sha256" (default) | "sha1" | "sha512"
  # ip_whitelist:
  #   - "192.30.252.0/22"       # GitHub webhook IPs (example)

# Execution policy (applies to all rules, can be overridden per-rule)
execution:
  policy: "block"                # "block" | "always" | "cooldown"
  # cooldown_seconds: 300        # only for "cooldown" policy

# Rule-level independent log file (dual-write: global + this file)
# log:
#   path: "./logs/github-auto-deploy.log"

# File-level filters: global constraints applied to ALL rules (AND with rule-level)
filters:
  - type: "header"
    key: "X-GitHub-Event"
    operator: "eq"
    value: "push"

rules:
  - name: "push-to-main"
    # Rule-level filters: combined with file-level via AND
    filters:
      - type: "body"
        key: "ref"
        operator: "eq"
        value: "refs/heads/main"
    actions:
      - type: "command"
        # Template variables: extract values from request and embed into command
        cmd: "echo 'Deploying {{.body.ref}} (event: {{.header.X-GitHub-Event}})'"
        timeout: 30
      - type: "command"
        cmd: "echo 'Installing dependencies...'"
        timeout: 120
      - type: "command"
        cmd: "echo 'Build complete!'"
        timeout: 30

  - name: "tag-release"
    execution:
      policy: "always"           # override: allow concurrent tag releases
    filters:
      - type: "body"
        key: "ref"
        operator: "regex"
        value: "refs/tags/v.*"
    actions:
      - type: "command"
        # pass_args: extract values from request and append as trailing arguments
        cmd: "echo 'New release tag:'"
        pass_args:
          - source: "body"
            key: "ref"
          - source: "header"
            key: "X-GitHub-Event"
        timeout: 60
      - type: "script"
        # env_from: inject request data as environment variables (HOOKRUN_ prefix auto-applied)
        # Default vars always available: $HOOKRUN_RAW_BODY, $HOOKRUN_TRIGGER_IP
        path: "./scripts/release.sh"
        env_from:
          - source: "body"
            key: "ref"
            env: "GIT_REF"              # → $HOOKRUN_GIT_REF
          - source: "header"
            key: "X-GitHub-Event"
            env: "GITHUB_EVENT"         # → $HOOKRUN_GITHUB_EVENT
        timeout: 120

  - name: "relay-to-servers"
    # Relay: forward webhook to other HookRun instances
    filters:
      - type: "body"
        key: "ref"
        operator: "regex"
        value: "refs/heads/.*"
    actions:
      - type: "command"
        cmd: "echo 'Local deploy for {{.body.ref}}'"
        timeout: 30
      - type: "relay"
        # Forward to multiple HookRun instances on other servers
        relay:
          targets:
            - url: "http://10.0.0.2:9000/webhook/deploy-app"
              token: "relay-secret-B"
            - url: "http://10.0.0.3:9000/webhook/deploy-app"
              token: "relay-secret-C"
          forward_headers:
            - "X-GitHub-Event"
          timeout: 30
          max_relay_hops: 3
