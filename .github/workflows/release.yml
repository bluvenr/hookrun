name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
            pkg: tar.gz
          - goos: linux
            goarch: arm64
            ext: ''
            pkg: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ''
            pkg: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ''
            pkg: tar.gz
          - goos: windows
            goarch: amd64
            ext: '.exe'
            pkg: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set version variables
        id: vars
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BINARY="hookrun-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          LDFLAGS="-X github.com/bluvenr/hookrun/internal/version.Version=${{ steps.vars.outputs.version }} -X 'github.com/bluvenr/hookrun/internal/version.BuildTime=${{ steps.vars.outputs.build_time }}' -s -w"
          go build -ldflags "$LDFLAGS" -trimpath -o "dist/${BINARY}" ./cmd/hookrun

      - name: Package (tar.gz)
        if: matrix.pkg == 'tar.gz'
        run: |
          PKG="hookrun-v${{ steps.vars.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          tar -czf "dist/${PKG}.tar.gz" -C dist "hookrun-${{ matrix.goos }}-${{ matrix.goarch }}"
          rm "dist/hookrun-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Package (zip)
        if: matrix.pkg == 'zip'
        run: |
          PKG="hookrun-v${{ steps.vars.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          cd dist
          zip "${PKG}.zip" "hookrun-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          rm "hookrun-${{ matrix.goos }}-${{ matrix.goarch }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hookrun-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
