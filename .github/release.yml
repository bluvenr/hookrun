changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 🚀 New Features
      labels:
        - feat
    - title: 🐛 Bug Fixes
      labels:
        - fix
    - title: 📝 Documentation
      labels:
        - docs
    - title: 🔧 Maintenance
      labels:
        - chore
    - title: 🏗️ CI/CD
      labels:
        - ci
